<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lista de Sementes</title>
	<!-- Link do CSS do Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Link do CSS da Sidebar -->
	<link rel="stylesheet" href="/css/sidebar.css">
	<link rel="stylesheet" href="/css/button.css">
	<link rel="stylesheet" href="/css/button2.css">
	<link rel="stylesheet" href="/css/listarFerramentas.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>

<body class="text-white" style="background-color: #212121;">

	<!-- Inclui a sidebar como fragmento -->
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<div class="container mt-5">
		<h1>Lista de Sementes</h1>

		<table
			class="table table-hover table-dark mt-3 border border-light shadow-lg p-3 mb-5 bg-body-tertiary rounded">
			<thead>
				<tr>
					<th scope="col">#</th>
					<th scope="col">Nome</th>
					<th scope="col">Data de Colheita</th>
					<th scope="col">Data de Validade</th>
					<th scope="col">Quantidade</th>
					<th scope="col">Condições de Armazenamento</th>
					<th scope="col">Produtor/Fabricante</th>
					<th scope="col">Ações</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="semente, iterStat : ${sementes}">
					<th scope="row" th:text="${iterStat.index + 1}"></th>
					<td th:text="${semente.nome}"></td>
					<td th:text="${semente.dataColheita}"></td>
					<td th:text="${semente.dataValidade}"></td>
					<td th:text="${semente.quantidade}"></td>
					<td th:text="${semente.condicoesArmazenamento}"></td>
					<td th:text="${semente.produtorFabricante}"></td>
					<td>
						<a th:href="@{/sementes/editar/{id}(id=${semente.id})}" class="btn btn-warning btn-sm mb-2"
							onclick="return confirm('Tem certeza que deseja editar esta semente?');">
							<i class="fas fa-edit"></i>
						</a>
						<a th:href="@{/sementes/deletar/{id}(id=${semente.id})}" class="btn btn-danger btn-sm mb-2"
							onclick="return confirm('Tem certeza que deseja deletar esta semente?');">
							<i class="fas fa-trash-alt"></i>
						</a>
					</td>
				</tr>
			</tbody>
		</table>

		<button onclick="window.location.href='/sementes/adicionar'">
			<span class="text">Adicionar Semente</span>
		</button>
	</div>

	<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
