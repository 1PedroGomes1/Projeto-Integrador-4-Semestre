<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Ferramenta</title>
    <!-- Link do CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css">
	<link rel="stylesheet" href="/css/input.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>
<body class="text-white" style="background-color: #212121;">
    
    <!-- Inclui a sidebar como fragmento -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
    <div class="container mt-5">
        <h1 class="text-center mb-4">Editar Ferramenta</h1>
        <form th:action="@{/ferramentas/editar/{id}(id=${ferramenta.id})}" method="post">
            <div class="row mb-3">
                <div class="col">
                    <label for="nome" class="form-label">Nome:</label>
                    <input type="text" class="form-control input-dark" id="nome" name="nome" th:value="${ferramenta.nome}" placeholder="Ex: Martelo" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="marca" class="form-label">Marca:</label>
                    <input type="text" class="form-control input-dark" id="marca" name="marca" th:value="${ferramenta.marca}" placeholder="Ex: Bellota" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="descricao" class="form-label">Descrição:</label>
                    <textarea class="form-control input-dark" id="descricao" name="descricao" placeholder="Ex: Usado para pregos" required th:text="${ferramenta.descricao}"></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="quantidade" class="form-label">Quantidade:</label>
                    <input type="number" class="form-control input-dark" id="quantidade" name="quantidade" th:value="${ferramenta.quantidade}" placeholder="Ex: 4" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Salvar Alterações</button>
            <a href="/ferramentas" class="btn btn-primary mt-3">Lista de Ferramentas</a>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <!-- Script do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
