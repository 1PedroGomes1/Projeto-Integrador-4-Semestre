<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Ferramentas</title>
    <!-- Link do CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link do CSS da Sidebar -->                                
    <link rel="stylesheet" href="/css/sidebar.css">
	<link rel="stylesheet" href="/css/button.css">
	
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>
<body class="text-white" style="background-color: #212121;">
    
    <!-- Inclui a sidebar como fragmento -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="container mt-5">
        <h1>Lista de Ferramentas</h1>
        
        
            <table class="table table-hover table-dark mt-3 border border-light shadow-lg p-3 mb-5 bg-body-tertiary rounded">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Marca</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Quantidade</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ferramenta, iterStat : ${ferramentas}">
                        <th scope="row" th:text="${iterStat.index + 1}"></th>
                        <td th:text="${ferramenta.nome}"></td>
                        <td th:text="${ferramenta.marca}"></td>
                        <td th:text="${ferramenta.descricao}"></td>
                        <td th:text="${ferramenta.quantidade}"></td>
                        <td>
                            <a th:href="@{/ferramentas/editar/{id}(id=${ferramenta.id})}" class="btn btn-warning btn-sm">
                                <i class="fas fa-edit"></i> Editar
                            </a>
                            <a th:href="@{/ferramentas/deletar/{id}(id=${ferramenta.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja deletar esta ferramenta?');">
                                <i class="fas fa-trash-alt"></i> Deletar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        
        
			<button onclick="window.location.href='/ferramentas/adicionar'">
			    <span class="text">Adicionar Nova Ferramenta</span>
			</button>

    </div>
    
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
