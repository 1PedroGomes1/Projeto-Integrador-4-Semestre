<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Semente</title>
    <!-- Link do CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css">
	<link rel="stylesheet" href="/css/input.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>
<body class="text-white" style="background-color: #212121;">

    <!-- Inclui a sidebar como fragmento -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
    <div class="container mt-5">
        <h1 class="text-center mb-4">Editar Semente</h1>
        <form th:action="@{/sementes/editar/{id}(id=${semente.id})}" method="post">
            <input type="hidden" th:value="${semente.id}" name="id" />
            <div class="row mb-3">
                <div class="col">
                    <label for="nome" class="form-label">Nome:</label>
                    <input type="text" class="form-control input-dark" id="nome" name="nome" th:value="${semente.nome}" placeholder="Nome da Semente" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="dataColheita" class="form-label">Data de Colheita:</label>
                    <input type="date" class="form-control input-dark" id="dataColheita" name="dataColheita" th:value="${semente.dataColheita}" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="dataValidade" class="form-label">Data de Validade:</label>
                    <input type="date" class="form-control input-dark" id="dataValidade" name="dataValidade" th:value="${semente.dataValidade}" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="quantidade" class="form-label">Quantidade (Sacos):</label>
                    <input type="number" class="form-control input-dark" id="quantidade" name="quantidade" th:value="${semente.quantidade}" placeholder="Quantidade (Sacos)" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="condicoesArmazenamento" class="form-label">Condições de Armazenamento:</label>
                    <textarea class="form-control input-dark" id="condicoesArmazenamento" name="condicoesArmazenamento" placeholder="Condições de Armazenamento" required th:text="${semente.condicoesArmazenamento}"></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="produtorFabricante" class="form-label">Produtor/Fabricante:</label>
                    <input type="text" class="form-control input-dark" id="produtorFabricante" name="produtorFabricante" th:value="${semente.produtorFabricante}" placeholder="Nome do Produtor/Fabricante" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Editar Semente</button>
            <a href="/sementes" class="btn btn-primary mt-3">Lista de Sementes</a>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <!-- Script do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
